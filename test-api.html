<!DOCTYPE html>
<html>
<head>
    <title>Teste API</title>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        pre { background: #f0f0f0; padding: 15px; border-radius: 4px; overflow-x: auto; max-height: 500px; overflow-y: auto; }
        .card { background: #f9f9f9; padding: 10px; margin: 10px 0; border-left: 4px solid #007bff; }
        .count { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Teste de Conexão com API DriveZ</h1>
        
        <div style="margin-bottom: 20px;">
            <button onclick="testarPrestadores()">📦 Testar Prestadores</button>
            <button onclick="testarPedidos()">📋 Testar Pedidos (ID 1)</button>
            <button onclick="testarPedidosCliente()">📋 Testar Pedidos Cliente</button>
            <button onclick="limpar()">🗑️ Limpar</button>
        </div>

        <h2>Resultado:</h2>
        <div id="resultado">Clique nos botões acima para testar...</div>
        
        <h2>Prestadores Carregados:</h2>
        <div id="prestadores"></div>
    </div>

    <script>
        let dataCache = null;

        async function testarPrestadores() {
            const resultado = document.getElementById('resultado');
            const prestadoresDiv = document.getElementById('prestadores');
            resultado.innerHTML = '<p>⏳ Carregando prestadores...</p>';
            
            try {
                const response = await fetch('http://localhost:8080/v1/drivez/prestador');
                const data = await response.json();
                dataCache = data;
                
                let html = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                resultado.innerHTML = html;
                
                if (data && data.response && Array.isArray(data.response)) {
                    console.log('✅ Prestadores encontrados:', data.response.length);
                    
                    let prestadores = data.response.slice(0, 5);
                    let prestHTML = '<div class="count">Total: ' + data.response.length + '</div>';
                    
                    prestadores.forEach(p => {
                        prestHTML += `
                            <div class="card">
                                <strong>${p.nome}</strong><br>
                                Email: ${p.email}<br>
                                ID: ${p.id_prestador}<br>
                                Categoria: ${p.categoria || 'N/A'}
                            </div>
                        `;
                    });
                    
                    prestadoresDiv.innerHTML = prestHTML;
                }
            } catch (error) {
                resultado.innerHTML = '<p style="color: red;">❌ ERRO: ' + error.message + '</p>';
                console.error('Erro:', error);
            }
        }

        async function testarPedidos() {
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = '<p>⏳ Carregando pedidos do cliente 1...</p>';
            
            try {
                const response = await fetch('http://localhost:8080/v1/drivez/pedido/cliente/1');
                const data = await response.json();
                
                let html = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                resultado.innerHTML = html;
            } catch (error) {
                resultado.innerHTML = '<p style="color: red;">❌ ERRO: ' + error.message + '</p>';
            }
        }

        async function testarPedidosCliente() {
            const clienteId = prompt('Digite o ID do cliente:', '1');
            if (!clienteId) return;
            
            const resultado = document.getElementById('resultado');
            resultado.innerHTML = '<p>⏳ Carregando pedidos do cliente ' + clienteId + '...</p>';
            
            try {
                const response = await fetch(`http://localhost:8080/v1/drivez/pedido/cliente/${clienteId}`);
                const data = await response.json();
                
                let html = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                resultado.innerHTML = html;
            } catch (error) {
                resultado.innerHTML = '<p style="color: red;">❌ ERRO: ' + error.message + '</p>';
            }
        }

        function limpar() {
            document.getElementById('resultado').innerHTML = 'Limpo. Clique nos botões para testar.';
            document.getElementById('prestadores').innerHTML = '';
        }

        // Auto-test ao carregar
        console.log('Página de teste carregada. Clique nos botões para testar a API.');
    </script>
</body>
</html>
